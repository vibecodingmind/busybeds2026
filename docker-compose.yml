# ═══════════════════════════════════════════════════════════════
# BusyBeds Production Docker Compose
# Blue-Green Zero-Downtime Deployment Ready
#
# Usage:
#   Standard:  docker compose up -d
#   Blue slot: APP_PORT=3000 docker compose -p busybeds-blue up -d --build
#   Green slot: APP_PORT=3001 docker compose -p busybeds-green up -d --build
#
# The deploy script handles slot switching automatically.
# ═══════════════════════════════════════════════════════════════

services:
  # ── BusyBeds Next.js App ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - busybeds-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
    labels:
      - "com.busybeds.app=busybeds"
      - "com.busybeds.role=web"

  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: busybeds_prod
      POSTGRES_USER: busybeds
      POSTGRES_PASSWORD: ${DB_PASSWORD:-BusyB3ds2026}
    volumes:
      - busybeds-pgdata:/var/lib/postgresql/data
    networks:
      - busybeds-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U busybeds -d busybeds_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      - "com.busybeds.app=busybeds"
      - "com.busybeds.role=database"

volumes:
  busybeds-pgdata:
    driver: local
    labels:
      - "com.busybeds.app=busybeds"

networks:
  busybeds-network:
    driver: bridge
    labels:
      - "com.busybeds.app=busybeds"
