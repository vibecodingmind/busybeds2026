[Unit]
Description=BusyBeds GitHub Webhook Auto-Deploy Listener
After=network.target docker.service
Requires=docker.service

[Service]
Type=simple
WorkingDirectory=/var/www/busybeds/auto-deploy
ExecStart=/usr/bin/node /var/www/busybeds/auto-deploy/webhook-listener.js
Restart=always
RestartSec=5
Environment=WEBHOOK_PORT=9000
Environment=GITHUB_WEBHOOK_SECRET=REPLACE_WITH_YOUR_SECRET
Environment=DEPLOY_SCRIPT=/var/www/busybeds/auto-deploy/deploy-on-push.sh
Environment=DEPLOY_LOG=/var/www/busybeds/auto-deploy/deploy.log
Environment=NODE_ENV=production

# Security hardening
NoNewPrivileges=true
ProtectSystem=strict
ReadWritePaths=/var/www/busybeds/auto-deploy
ReadWritePaths=/var/www/busybeds

[Install]
WantedBy=multi-user.target
