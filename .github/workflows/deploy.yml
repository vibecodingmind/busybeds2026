# ═══════════════════════════════════════════════════════════════
# BusyBeds Auto-Deploy to VPS via SSH
# Add this file via GitHub Web UI (Settings → Actions → General)
# Or use a token with 'workflow' scope
#
# Required GitHub Secrets:
#   VPS_HOST: Your VPS IP (e.g., 45.151.123.253)
#   VPS_USER: SSH username (e.g., root)
#   VPS_SSH_KEY: SSH private key content
# ═══════════════════════════════════════════════════════════════

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🚀 Deploying BusyBeds..."
            cd /var/www/busybeds
            git pull origin main
            docker compose up -d --build
            sleep 10
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000)
            echo "Health check: HTTP $HTTP_CODE"
